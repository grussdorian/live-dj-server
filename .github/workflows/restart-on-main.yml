name: Restart service on main

on:
  push:
    branches: [ main ]

jobs:
  restart:
    name: Restart service
    runs-on: [self-hosted, linux]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Copy env file
        run: |
          if [ -f /env/live-dj-server/.env ]; then
            cp /env/live-dj-server/.env .env
            echo ".env copied"
          else
            echo "No env file to copy at /env/live-dj-server/.env"
          fi

      - name: Install dependencies
        run: npm install
        env:
          NODE_ENV: production

      - name: Restart server with PM2
        run: |
          if npx pm2 list | grep -q "live-dj-server"; then
            echo "Restarting existing PM2 process..."
            npx pm2 restart live-dj-server
          else
            echo "Starting new PM2 process..."
            npx pm2 start src/server.js --name live-dj-server --watch --ignore-watch="node_modules"
          fi

          npx pm2 save
        env:
          NODE_ENV: production
